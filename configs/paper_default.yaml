data:
  date_col: date
  asset_col: asset
  return_col: ret
  price_col: close
  volume_col: volume
  market_return_col: market_ret
  spread_col: spread
  exchange_col: exchange
  share_code_col: share_code
  eligible_exchanges: [NYSE, NASDAQ, AMEX]
  common_share_codes: [10, 11]
  min_price: 5.0
  min_history_days: 252
split:
  is_end: '2020-12-31'
  oos_start: '2021-01-01'
preprocessing:
  target_winsor_lower: 0.01
  target_winsor_upper: 0.99
  factor_winsor_lower: 0.01
  factor_winsor_upper: 0.99
evaluation:
  tau_sig: 3.0
  tau_econ: 1.0
  tau_fail: 1.0
  require_positive_monotonicity: true
agent:
  mode: agentic
  seed: 42
  rounds: 8
  candidates_per_round: 36
aggregation:
  lgbm:
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    max_depth: 4
    min_child_samples: 50
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0
costs:
  one_way_bps: 3.0
benchmarks: {}
